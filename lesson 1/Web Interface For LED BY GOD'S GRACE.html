<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LED Control Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .led-display {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 30px auto;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .led-off {
            background-color: #ddd;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .led-on {
            background-color: #ff4444;
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.8);
        }

        .status {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin: 20px 0;
        }

        .status-text {
            color: #666;
            font-size: 16px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }

        button {
            flex: 1;
            padding: 15px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-on {
            background-color: #4CAF50;
            color: white;
        }

        .btn-on:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        .btn-on:active {
            transform: scale(0.98);
        }

        .btn-off {
            background-color: #f44336;
            color: white;
        }

        .btn-off:hover {
            background-color: #da190b;
            transform: scale(1.05);
        }

        .btn-off:active {
            transform: scale(0.98);
        }

        .info {
            margin-top: 30px;
            padding: 15px;
            background-color: #f0f0f0;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔦 LED Control</h1>
        
        <div class="led-display led-off" id="ledIndicator"></div>
        
        <div class="status">
            <span class="status-text" id="statusText">LED is OFF</span>
        </div>

        <div class="button-group">
            <button class="btn-on" onclick="turnOnLED()">Turn ON</button>
            <button class="btn-off" onclick="turnOffLED()">Turn OFF</button>
        </div>

        <div class="info">
            💡 Click the buttons above to control the LED
        </div>
    </div>

    <script>
        // Get HTML elements
        const ledIndicator = document.getElementById('ledIndicator');
        const statusText = document.getElementById('statusText');

        // Variable to track LED state
        let isLEDOn = false;

        // Function to turn LED ON
        function turnOnLED() {
            isLEDOn = true;
            updateDisplay();
            console.log('LED turned ON');
        }

        // Function to turn LED OFF
        function turnOffLED() {
            isLEDOn = false;
            updateDisplay();
            console.log('LED turned OFF');
        }

        // Function to update the display
        function updateDisplay() {
            if (isLEDOn) {
                ledIndicator.className = 'led-display led-on';
                statusText.textContent = 'LED is ON';
            } else {
                ledIndicator.className = 'led-display led-off';
                statusText.textContent = 'LED is OFF';
            }
        }

        // Initialize display
        updateDisplay();
    </script>
</body>
</html>
